name: "Build APK"

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2
        run: |
          GRADLE_ZIP="gradle-8.2-bin.zip"
          wget -q --tries=5 --waitretry=15             "https://services.gradle.org/distributions/$GRADLE_ZIP"             -O /tmp/gradle.zip 2>/dev/null           || wget -q --tries=5 --waitretry=15             "https://downloads.gradle-dn.com/distributions/$GRADLE_ZIP"             -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create dirs
        run: |
          mkdir -p app/src/main/java/com/myapp/budget
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Write project files
        run: |
          echo "" | base64 -d > app/src/main/java/com/myapp/budget/MainActivity.java
          echo ""     | base64 -d > app/src/main/AndroidManifest.xml
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz48c3RyaW5nIG5hbWU9ImFwcF9uYW1lIj7luLPmnKw8L3N0cmluZz48L3Jlc291cmNlcz4="      | base64 -d > app/src/main/res/values/strings.xml
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJBcHBUaGVtZSIgcGFyZW50PSJAYW5kcm9pZDpzdHlsZS9UaGVtZS5Ob1RpdGxlQmFyLkZ1bGxzY3JlZW4iLz4KPC9yZXNvdXJjZXM+"       | base64 -d > app/src/main/res/values/themes.xml
          echo ""    | base64 -d > app/build.gradle
          echo "cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguMi4yJyBhcHBseSBmYWxzZQp9Cg=="   | base64 -d > build.gradle
          echo ""     | base64 -d > settings.gradle
          echo "YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9ZmFsc2UKb3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bQpvcmcuZ3JhZGxlLmRhZW1vbj1mYWxzZQ==" | base64 -d > gradle.properties
          echo "ZGlzdHJpYnV0aW9uQmFzZT1HUkFETEVfVVNFUl9IT01FCmRpc3RyaWJ1dGlvblBhdGg9d3JhcHBlci9kaXN0cwpkaXN0cmlidXRpb25Vcmw9aHR0cHNcOi8vc2VydmljZXMuZ3JhZGxlLm9yZy9kaXN0cmlidXRpb25zL2dyYWRsZS04LjItYmluLnppcAp6aXBTdG9yZUJhc2U9R1JBRExFX1VTRVJfSE9NRQp6aXBTdG9yZVBhdGg9d3JhcHBlci9kaXN0cw=="| base64 -d > gradle/wrapper/gradle-wrapper.properties

      - name: Write HTML
        run: |
          printf "" > /tmp/b64.txt
          printf "" >> /tmp/b64.txt
          base64 -d /tmp/b64.txt > app/src/main/assets/index.html
          echo "HTML: $(wc -c < app/src/main/assets/index.html) bytes"

      - name: Generate icons
        run: |
          pip install Pillow -q
          echo "" | base64 -d > /tmp/icons.py
          python3 /tmp/icons.py

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "帳本APP-APK"
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
